<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>IFC Hierarchy</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #151b24;
        --line: #293241;
        --text: #ecf2f8;
        --muted: #8b98ab;
        --warn: #ffb454;
        --err: #ff6b6b;
        --accent: #57d3a0;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at top, #152034 0, var(--bg) 58%);
        color: var(--text);
        font-family: Consolas, "Courier New", monospace;
      }
      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto 1fr;
      }
      .top {
        border-bottom: 1px solid var(--line);
        padding: 12px 14px;
        background: rgba(13, 17, 23, 0.85);
      }
      .title {
        margin: 0;
        font-size: 15px;
        letter-spacing: 0.04em;
      }
      .subtitle {
        margin-top: 4px;
        font-size: 11px;
        color: var(--muted);
      }
      .status,
      .caps,
      .hint {
        font-size: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .status.ok {
        color: var(--accent);
      }
      .status.err {
        color: var(--err);
      }
      .caps {
        color: var(--warn);
        font-size: 11px;
      }
      .hint {
        color: var(--muted);
        font-size: 11px;
      }
      .tree {
        overflow: auto;
        padding: 10px 0 24px;
        background: rgba(21, 27, 36, 0.95);
      }
      .tree-row {
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: 30px;
        padding-right: 8px;
      }
      .tree-toggle,
      .tree-label {
        border: 1px solid var(--line);
        background: #0f141c;
        color: var(--text);
        cursor: pointer;
      }
      .tree-toggle {
        width: 22px;
        height: 22px;
        padding: 0;
      }
      .tree-label {
        min-height: 22px;
        text-align: left;
        padding: 0 8px;
      }
      .tree-label-note {
        color: var(--warn);
      }
      .tree-spacer {
        display: inline-block;
        width: 22px;
      }
      .tree-loading,
      .tree-source {
        font-size: 10px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top">
        <h1 class="title">IFC Hierarchy</h1>
        <div class="subtitle">Project -> Site -> Building -> Storey -> Element</div>
      </div>
      <div id="status" class="status ok">Starting...</div>
      <div id="capabilities" class="caps">Capabilities: none</div>
      <div id="tree" class="tree"></div>
    </div>
    <div class="hint">
      This widget only shows true hierarchy where the project API exposes containment relations.
    </div>

    <script src="./streambim-widget-api.min.js"></script>
    <script src="./hierarchy-api.js"></script>
    <script src="./hierarchy-store.js"></script>
    <script src="./hierarchy-view.js"></script>
    <script>
      (function () {
        function init(api) {
          var adapter = new window.HierarchyApi(api);
          var store = new window.HierarchyStore(adapter);
          new window.HierarchyView(document.body, store, api);
          store.init();
        }

        if (window.StreamBIM && typeof window.StreamBIM.connect === "function") {
          window.StreamBIM
            .connect({})
            .then(function (api) {
              init(api || window.StreamBIM);
            })
            .catch(function () {
              init(window.StreamBIM || null);
            });
        } else {
          init(null);
        }
      })();
    </script>
  </body>
</html>
