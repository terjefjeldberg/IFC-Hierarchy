<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>IFC Hierarchy</title>
    <style>
      :root {
        --bg: #f3f5f7;
        --panel: #ffffff;
        --panel-soft: #f8fafb;
        --line: #d8dee6;
        --text: #18222d;
        --muted: #667789;
        --accent: #2c6db5;
        --selected: #dceaf8;
        --selected-line: #67a0da;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto auto auto 1fr;
        background: var(--panel);
      }
      .top {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .title {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #22303d;
      }
      .subtitle {
        margin-top: 3px;
        font-size: 11px;
        color: var(--muted);
      }
      .toolbar,
      .status,
      .caps,
      .selection,
      .hint {
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
      }
      .toolbar {
        display: flex;
        gap: 6px;
        padding: 6px 8px;
      }
      .tool-btn {
        border: 1px solid #cbd5df;
        background: #fff;
        color: #304051;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        cursor: pointer;
      }
      .tool-btn:hover {
        border-color: #9eb0c2;
      }
      .status,
      .caps,
      .selection,
      .hint {
        padding: 5px 10px;
        font-size: 11px;
      }
      .status.ok {
        color: #2c7a48;
      }
      .status.err {
        color: #c44343;
      }
      .caps,
      .hint {
        color: var(--muted);
      }
      .selection {
        max-height: 38px;
        overflow: hidden;
      }
      .selection-label {
        display: block;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 1px;
      }
      .selection-path {
        font-size: 11px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tree {
        overflow: auto;
        min-height: 0;
        padding: 6px 0 18px;
        background: var(--panel);
      }
      .tree-row {
        display: flex;
        align-items: center;
        min-height: 24px;
        gap: 4px;
        position: relative;
        padding-right: 8px;
      }
      .tree-toggle,
      .tree-spacer {
        width: 16px;
        min-width: 16px;
        text-align: center;
      }
      .tree-toggle {
        border: 0;
        background: transparent;
        color: #526274;
        cursor: pointer;
        font-size: 11px;
        padding: 0;
      }
      .tree-item {
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        min-height: 24px;
        padding: 2px 6px;
        cursor: pointer;
        border-radius: 3px;
      }
      .tree-item:hover {
        background: #eef4fb;
      }
      .tree-item-in-path {
        background: #f4f8fc;
      }
      .tree-item-selected {
        background: var(--selected);
        box-shadow: inset 3px 0 0 var(--selected-line);
      }
      .tree-icon {
        width: 16px;
        min-width: 16px;
        color: #596b7d;
        font-size: 13px;
        text-align: center;
      }
      .tree-content {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
        flex: 1;
      }
      .tree-title {
        font-size: 13px;
        color: #18222d;
        white-space: nowrap;
      }
      .tree-subtitle {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tree-loading {
        font-size: 10px;
        color: var(--muted);
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top">
        <h1 class="title">MODEL TREE</h1>
        <div class="subtitle">Indexed IFC hierarchy with StreamBIM object focus.</div>
      </div>
      <div class="toolbar">
        <button id="collapse-all" class="tool-btn">Collapse</button>
        <button id="expand-2" class="tool-btn">Expand 2</button>
        <button id="expand-4" class="tool-btn">Expand 4</button>
      </div>
      <div id="status" class="status ok">Starting...</div>
      <div id="capabilities" class="caps">Capabilities: none</div>
      <div class="selection">
        <span class="selection-label">Selected path</span>
        <div id="selection-path" class="selection-path">No object selected</div>
      </div>
      <div id="tree" class="tree"></div>
    </div>
    <div class="hint">
      Click an object in StreamBIM to focus the matching IFC node in the model tree.
    </div>

    <script src="./streambim-widget-api.min.js"></script>
    <script src="./hierarchy-api.js"></script>
    <script src="./hierarchy-store.js"></script>
    <script src="./hierarchy-view.js"></script>
    <script>
      (function () {
        var pendingPick = null;
        var activeStore = null;

        function handlePickedObject(res) {
          if (activeStore) {
            activeStore.focusPickedObject(res);
          } else {
            pendingPick = res;
          }
        }

        function init(api) {
          var adapter = new window.HierarchyApi(api);
          var store = new window.HierarchyStore(adapter);
          activeStore = store;
          new window.HierarchyView(document.body, store, api);
          store.init().then(function () {
            if (pendingPick) {
              store.focusPickedObject(pendingPick);
              pendingPick = null;
            }
          });
        }

        if (window.StreamBIM && typeof window.StreamBIM.connect === "function") {
          window.StreamBIM
            .connect({
              pickedObject: function (res) {
                handlePickedObject(res);
              },
            })
            .then(function (api) {
              init(api || window.StreamBIM);
            })
            .catch(function () {
              init(window.StreamBIM || null);
            });
        } else {
          init(null);
        }
      })();
    </script>
  </body>
</html>
