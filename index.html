<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>IFC Hierarchy</title>
    <style>
      :root {
        --bg: #171b22;
        --panel: #252b34;
        --panel-soft: #2b323d;
        --panel-deep: #1d222b;
        --panel-ink: #191d25;
        --line: #39404b;
        --line-soft: #303641;
        --text: #f3f4f6;
        --text-soft: #cfd4da;
        --muted: #8f98a5;
        --accent: #f6a21a;
        --accent-soft: #d98910;
        --accent-dim: #885918;
        --selected: rgba(246, 162, 26, 0.16);
        --selected-line: #f6a21a;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(circle at top right, rgba(246, 162, 26, 0.12), transparent 32%),
          linear-gradient(180deg, #252b34 0%, #171b22 100%);
        color: var(--text);
        font-family: "Segoe UI Variable", "Segoe UI", Tahoma, sans-serif;
        overflow: hidden;
      }
      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto minmax(220px, 1.1fr) minmax(240px, 0.95fr) auto;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0)),
          var(--panel);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .title {
        margin: 0;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        color: var(--accent);
      }
      .subtitle {
        font-size: 11px;
        color: var(--text-soft);
      }
      .toolbar,
      .columns,
      .footer {
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
      }
      .toolbar {
        gap: 6px;
        padding: 6px 8px;
        flex-wrap: wrap;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0)),
          var(--panel-soft);
      }
      .tool-btn {
        border: 1px solid rgba(246, 162, 26, 0.35);
        background: var(--panel-ink);
        color: var(--accent);
        border-radius: 3px;
        padding: 5px 9px;
        font-size: 11px;
        cursor: pointer;
        transition:
          background-color 120ms ease,
          border-color 120ms ease,
          color 120ms ease;
      }
      .tool-btn:hover:not(:disabled) {
        border-color: rgba(246, 162, 26, 0.65);
        background: rgba(246, 162, 26, 0.1);
      }
      .tool-btn:disabled {
        cursor: default;
        opacity: 0.45;
        color: var(--muted);
      }
      .toolbar-note {
        margin-left: auto;
        font-size: 10px;
        color: var(--accent-soft);
        white-space: nowrap;
      }
      .columns {
        padding: 4px 10px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        justify-content: flex-start;
        background: var(--panel-soft);
      }
      .tree {
        overflow: auto;
        min-height: 0;
        background: var(--panel-deep);
        padding: 2px 0 10px;
        border-bottom: 1px solid var(--line);
      }
      .tree-row {
        display: flex;
        align-items: center;
        min-height: 29px;
        gap: 6px;
        padding-right: 8px;
      }
      .tree-toggle,
      .tree-spacer {
        width: 18px;
        min-width: 18px;
        text-align: center;
      }
      .tree-toggle {
        border: 0;
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        font-size: 11px;
        padding: 0;
      }
      .tree-toggle:hover {
        color: #ffbf57;
      }
      .tree-item {
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        width: 100%;
        min-height: 29px;
        padding: 4px 8px;
        cursor: pointer;
        min-width: 0;
        transition:
          background-color 120ms ease,
          color 120ms ease;
      }
      .tree-item:hover {
        background: rgba(246, 162, 26, 0.08);
      }
      .tree-item:hover .tree-title {
        color: var(--accent);
      }
      .tree-item-in-path {
        background: rgba(255, 255, 255, 0.03);
      }
      .tree-item-selected {
        background: var(--selected);
        box-shadow: inset 2px 0 0 var(--selected-line);
      }
      .tree-row + .tree-row .tree-item {
        border-top: 1px solid var(--line-soft);
      }
      .tree-icon {
        width: 16px;
        min-width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #9da5b1;
        text-align: center;
        flex: 0 0 16px;
      }
      .tree-icon svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        overflow: visible;
      }
      .tree-title {
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 12.5px;
        font-weight: 500;
        text-align: left;
      }
      .tree-item-selected .tree-title {
        color: var(--accent);
      }
      .tree-detail {
        font-size: 10.5px;
        color: var(--muted);
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tree-loading {
        font-size: 10px;
        color: var(--accent-soft);
        white-space: nowrap;
      }
      .properties-panel {
        min-height: 0;
        background: var(--panel);
      }
      .properties {
        min-height: 0;
        height: 100%;
        overflow: auto;
        padding: 0 0 12px;
        box-sizing: border-box;
      }
      .properties-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 0;
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .properties-heading-wrap {
        min-width: 0;
      }
      .properties-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        margin-bottom: 4px;
      }
      .properties-title {
        font-size: 21px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.2;
        word-break: break-word;
      }
      .properties-helper {
        margin-top: 8px;
        font-size: 11px;
        color: var(--accent-soft);
      }
      .properties-subtitle {
        font-size: 11px;
        color: var(--text-soft);
        white-space: nowrap;
        padding-top: 20px;
      }
      .properties-empty {
        font-size: 12px;
        color: var(--muted);
        padding: 14px;
        border-top: 1px solid var(--line-soft);
      }
      .properties-error {
        color: #ff7b72;
      }
      .property-group {
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
        overflow: hidden;
        margin-top: 10px;
      }
      .property-group:first-of-type {
        margin-top: 0;
      }
      .property-group-header {
        width: 100%;
        border: 0;
        background: var(--panel-soft);
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 10px;
        align-items: center;
        padding: 13px 14px;
        cursor: pointer;
        text-align: left;
        color: var(--accent);
        transition: background-color 120ms ease;
      }
      .property-group-header:hover {
        background: rgba(246, 162, 26, 0.08);
      }
      .property-group-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--accent);
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .property-group-meta,
      .property-group-caret {
        font-size: 12px;
        color: var(--accent);
      }
      .property-group-body {
        background: var(--panel-deep);
      }
      .property-row {
        display: grid;
        grid-template-columns: minmax(120px, 42%) 1fr;
        border-top: 1px solid var(--line-soft);
        background: var(--panel-deep);
      }
      .property-row:first-child {
        border-top: 0;
      }
      .property-name {
        padding: 12px 14px;
        font-size: 12.5px;
        color: var(--text);
        background: var(--panel-ink);
        border-right: 1px solid var(--line);
        word-break: break-word;
      }
      .property-value {
        padding: 12px 14px;
        font-size: 12.5px;
        color: var(--text);
        background: var(--panel-deep);
        word-break: break-word;
      }
      .property-cell-button {
        width: 100%;
        border: 0;
        text-align: left;
        cursor: pointer;
        display: block;
        position: relative;
        font: inherit;
        appearance: none;
        transition:
          background-color 120ms ease,
          color 120ms ease;
      }
      .property-cell-clickable {
        color: var(--accent);
      }
      .property-name.property-cell-clickable {
        background:
          linear-gradient(90deg, rgba(246, 162, 26, 0.08), rgba(0, 0, 0, 0) 88%),
          var(--panel-ink);
      }
      .property-value.property-cell-clickable {
        background:
          linear-gradient(90deg, rgba(246, 162, 26, 0.06), rgba(0, 0, 0, 0) 88%),
          var(--panel-deep);
        padding-right: 30px;
      }
      .property-value.property-cell-clickable::after {
        content: ">";
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        color: var(--accent-dim);
        font-size: 12px;
      }
      .property-cell-readonly {
        color: var(--text);
      }
      .property-name.property-cell-clickable:hover,
      .property-value.property-cell-clickable:hover {
        background-color: rgba(246, 162, 26, 0.12);
        color: #ffbf57;
      }
      .footer {
        justify-content: space-between;
        gap: 10px;
        padding: 6px 10px;
        font-size: 10px;
        color: var(--muted);
        background: var(--panel-soft);
      }
      .footer-status.ok {
        color: var(--accent);
      }
      .footer-status.err {
        color: #ff7b72;
      }
      .footer-meta {
        border: 1px solid rgba(246, 162, 26, 0.35);
        border-radius: 999px;
        padding: 1px 7px;
        background: var(--panel-ink);
        color: var(--accent-soft);
      }
      .tool-btn:focus-visible,
      .tree-toggle:focus-visible,
      .tree-item:focus-visible,
      .property-group-header:focus-visible,
      .property-cell-button:focus-visible {
        outline: 1px solid var(--accent);
        outline-offset: -1px;
      }
      @media (max-width: 420px) {
        .top {
          padding: 8px 10px;
        }
        .toolbar {
          gap: 5px;
          padding: 6px;
        }
        .tool-btn {
          flex: 1 1 auto;
          min-width: calc(50% - 5px);
        }
        .toolbar-note {
          width: 100%;
          margin-left: 0;
          padding-top: 4px;
        }
        .properties-top {
          flex-direction: column;
          gap: 6px;
        }
        .properties-subtitle {
          padding-top: 0;
          white-space: normal;
        }
        .property-row {
          grid-template-columns: minmax(108px, 44%) 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top">
        <h1 class="title">MODEL TREE</h1>
        <div class="subtitle">IFC-indexed model hierarchy</div>
      </div>
      <div class="toolbar">
        <button id="collapse-all" class="tool-btn">Collapse</button>
        <button id="expand-2" class="tool-btn">Expand 2</button>
        <button id="expand-4" class="tool-btn">Expand 4</button>
        <button id="load-ifc" class="tool-btn">Load IFC files</button>
        <button id="clear-ifc" class="tool-btn">Clear IFC files</button>
        <input id="ifc-files" type="file" accept=".ifc" multiple style="display: none" />
        <span id="ifc-summary" class="toolbar-note">No IFC loaded</span>
      </div>
      <div class="columns">
        <span class="columns-name">Name</span>
      </div>
      <div id="tree" class="tree"></div>
      <div class="properties-panel">
        <div id="properties" class="properties"></div>
      </div>
      <div class="footer">
        <span id="status" class="footer-status ok">Starting...</span>
        <span id="meta" class="footer-meta" title="Capabilities: none">0 IFC</span>
      </div>
    </div>

    <script src="./streambim-widget-api.min.js"></script>
    <script src="./hierarchy-api.js"></script>
    <script src="./hierarchy-store.js"></script>
    <script src="./hierarchy-view.js"></script>
    <script>
      (function () {
        var pendingPick = null;
        var activeStore = null;

        function handlePickedObject(res) {
          if (activeStore) {
            activeStore.focusPickedObject(res);
          } else {
            pendingPick = res;
          }
        }

        function init(api) {
          var adapter = new window.HierarchyApi(api);
          var store = new window.HierarchyStore(adapter);
          activeStore = store;
          new window.HierarchyView(document.body, store, api);
          store.init().then(function () {
            if (pendingPick) {
              store.focusPickedObject(pendingPick);
              pendingPick = null;
            }
          });
        }

        if (window.StreamBIM && typeof window.StreamBIM.connect === "function") {
          window.StreamBIM
            .connect({
              pickedObject: function (res) {
                handlePickedObject(res);
              },
            })
            .then(function (api) {
              init(api || window.StreamBIM);
            })
            .catch(function () {
              init(window.StreamBIM || null);
            });
        } else {
          init(null);
        }
      })();
    </script>
  </body>
</html>
