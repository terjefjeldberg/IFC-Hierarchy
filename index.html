<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>IFC Hierarchy</title>
    <style>
      :root {
        --bg: #f2f4f6;
        --panel: #ffffff;
        --panel-soft: #f7f8fa;
        --line: #d7dde4;
        --line-soft: #eceff3;
        --text: #1d2731;
        --muted: #6b7b8c;
        --accent: #2f6fb5;
        --selected: #dfeaf7;
        --selected-line: #6aa0d8;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        background: var(--panel);
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .title {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #22303d;
      }
      .subtitle {
        font-size: 11px;
        color: var(--muted);
      }
      .toolbar,
      .columns,
      .footer {
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
      }
      .toolbar {
        gap: 6px;
        padding: 5px 8px;
        flex-wrap: wrap;
      }
      .tool-btn {
        border: 1px solid #cbd4de;
        background: #fff;
        color: #314050;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        cursor: pointer;
      }
      .tool-btn:hover:not(:disabled) {
        border-color: #9caec0;
      }
      .tool-btn:disabled {
        cursor: default;
        opacity: 0.55;
      }
      .toolbar-note {
        margin-left: auto;
        font-size: 10px;
        color: var(--muted);
        white-space: nowrap;
      }
      .columns {
        padding: 4px 10px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        justify-content: flex-start;
      }
      .columns-name {
        flex: 0 1 auto;
      }
      .columns-type {
        display: none;
      }
      .tree {
        overflow: auto;
        min-height: 0;
        background: var(--panel);
        padding: 4px 0 10px;
      }
      .tree-row {
        display: flex;
        align-items: center;
        min-height: 24px;
        gap: 4px;
        padding-right: 8px;
      }
      .tree-toggle,
      .tree-spacer {
        width: 16px;
        min-width: 16px;
        text-align: center;
      }
      .tree-toggle {
        border: 0;
        background: transparent;
        color: #556678;
        cursor: pointer;
        font-size: 11px;
        padding: 0;
      }
      .tree-item {
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        width: 100%;
        min-height: 24px;
        padding: 2px 6px;
        cursor: pointer;
        min-width: 0;
      }
      .tree-item:hover {
        background: #eef4fb;
      }
      .tree-item-in-path {
        background: #f7fbff;
      }
      .tree-item-selected {
        background: var(--selected);
        box-shadow: inset 3px 0 0 var(--selected-line);
      }
      .tree-row + .tree-row .tree-item {
        border-top: 1px solid var(--line-soft);
      }
      .tree-icon {
        width: 16px;
        min-width: 16px;
        color: #5c6d7e;
        font-size: 12px;
        text-align: center;
      }
      .tree-title {
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 13px;
        text-align: left;
      }
      .tree-detail {
        font-size: 11px;
        color: var(--muted);
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tree-loading {
        font-size: 10px;
        color: var(--muted);
        white-space: nowrap;
      }
      .footer {
        justify-content: space-between;
        gap: 10px;
        padding: 4px 10px;
        font-size: 10px;
        color: var(--muted);
      }
      .footer-status.ok {
        color: #2d7d47;
      }
      .footer-status.err {
        color: #c44343;
      }
      .footer-meta {
        border: 1px solid #ccd5df;
        border-radius: 999px;
        padding: 1px 7px;
        background: #fff;
        color: #5c6d7e;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top">
        <h1 class="title">MODEL TREE</h1>
        <div class="subtitle">IFC-indexed model hierarchy</div>
      </div>
      <div class="toolbar">
        <button id="collapse-all" class="tool-btn">Collapse</button>
        <button id="expand-2" class="tool-btn">Expand 2</button>
        <button id="expand-4" class="tool-btn">Expand 4</button>
        <button id="load-ifc" class="tool-btn">Load IFC files</button>
        <button id="clear-ifc" class="tool-btn">Clear uploads</button>
        <input id="ifc-files" type="file" accept=".ifc" multiple style="display: none" />
        <span id="ifc-summary" class="toolbar-note">No IFC</span>
      </div>
      <div class="columns">
        <span class="columns-name">Name</span>
        <span class="columns-type">Type</span>
      </div>
      <div id="tree" class="tree"></div>
      <div class="footer">
        <span id="status" class="footer-status ok">Starting...</span>
        <span id="meta" class="footer-meta" title="Capabilities: none">0 IFC</span>
      </div>
    </div>

    <script src="./streambim-widget-api.min.js"></script>
    <script src="./hierarchy-api.js"></script>
    <script src="./hierarchy-store.js"></script>
    <script src="./hierarchy-view.js"></script>
    <script>
      (function () {
        var pendingPick = null;
        var activeStore = null;

        function handlePickedObject(res) {
          if (activeStore) {
            activeStore.focusPickedObject(res);
          } else {
            pendingPick = res;
          }
        }

        function init(api) {
          var adapter = new window.HierarchyApi(api);
          var store = new window.HierarchyStore(adapter);
          activeStore = store;
          new window.HierarchyView(document.body, store, api);
          store.init().then(function () {
            if (pendingPick) {
              store.focusPickedObject(pendingPick);
              pendingPick = null;
            }
          });
        }

        if (window.StreamBIM && typeof window.StreamBIM.connect === "function") {
          window.StreamBIM
            .connect({
              pickedObject: function (res) {
                handlePickedObject(res);
              },
            })
            .then(function (api) {
              init(api || window.StreamBIM);
            })
            .catch(function () {
              init(window.StreamBIM || null);
            });
        } else {
          init(null);
        }
      })();
    </script>
  </body>
</html>
